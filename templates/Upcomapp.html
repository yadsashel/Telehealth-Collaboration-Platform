<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css/PatientRecords.css') }}">
    <title>Upcoming Appointments</title>
</head>
<body>
    
     <!---- Creating the navbar and the icon ----->
     <header>
        <a href="{{ url_for ('index') }}">
        <img src="../static/assets/Icons/mainIcon.png" alt="Telehealth Logo">
        <nav>
            <ul>
                <li><a href="{{ url_for ('Upcom') }}">Upcoming Appointments</a></li>
                <li><a href="{{ url_for ('Consult') }}">Consultation History</a></li>
                <li><a href="{{ url_for ('Medicines') }}">My Medicines</a></li>
            </ul>
        </nav>
    </header>


<!-- UpcomingAppointments.html -->
<form id="appointmentForm">
    <label for="name">Name:</label>
    <input type="text" id="name" name="name" required>
 
    <label for="age">Age:</label>
    <input type="number" id="age" name="age" required>

    <label for="gender">Gender:</label>
    <select id="gender" name="gender" required>
        <option value="male">Male</option>
        <option value="female">Female</option>
        <option value="other">Other</option> 
    </select>

    <label for="reason">Reason:</label>
    <textarea id="reason" name="reason" required></textarea>

    <label for="date">Date:</label>
    <input type="date" id="date" name="date" required>

    <label for="time">Time:</label>
    <input type="time" id="time" name="time" required>

    <button type="submit">Schedule Appointment</button>
</form>


<div id="message"></div> 
</body>
</html>
